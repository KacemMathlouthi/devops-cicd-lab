services:
  jenkins:
    build:
      context: ./ci
      dockerfile: jenkins.Dockerfile
    image: devops-cicd-lab/jenkins:latest
    container_name: jenkins
    restart: unless-stopped
    ports:
      - "8090:8080"
      - "50000:50000"
    environment:
      JENKINS_OPTS: "--prefix=/"
      JAVA_OPTS: "-Djenkins.install.runSetupWizard=true"
    group_add:
      - "${DOCKER_GID:-999}"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - ./infra/terraform:/host-tf-state:rw
    networks:
      - default
      - kind
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/login"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP — AlertManager target
      - "8025:8025"   # Web UI

volumes:
  jenkins_home:

networks:
  default:
  kind:
    external: true

