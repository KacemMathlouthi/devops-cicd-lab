- name: Deploy devops-cicd-lab to Kubernetes
  hosts: localhost
  connection: local
  gather_facts: false

  collections:
    - kubernetes.core

  vars:
    ansible_python_interpreter: "{{ ansible_playbook_python }}"
    app_name: devops-cicd-lab
    k8s_namespace: demo
    image: kacemmathlouthi/devops-cicd-lab
    image_tag: "{{ lookup('env', 'IMAGE_TAG') | default('latest', true) }}"
    container_port: 5000
    replicas: 2
    ingress_host: app.127-0-0-1.nip.io
    kubeconfig_path: "{{ lookup('env', 'KUBECONFIG') | default(lookup('env', 'HOME') ~ '/.kube/config', true) }}"
    kube_context: "{{ lookup('env', 'KUBE_CONTEXT') | default('kind-devops-cicd-lab', true) }}"

  tasks:
    - name: Apply Deployment
      kubernetes.core.k8s:
        state: present
        kubeconfig: "{{ kubeconfig_path }}"
        context: "{{ kube_context }}"
        definition: "{{ lookup('template', 'templates/deployment.yaml.j2') | from_yaml }}"
        wait: true
        wait_timeout: 180

    - name: Apply Service
      kubernetes.core.k8s:
        state: present
        kubeconfig: "{{ kubeconfig_path }}"
        context: "{{ kube_context }}"
        definition: "{{ lookup('template', 'templates/service.yaml.j2') | from_yaml }}"

    - name: Apply Ingress
      kubernetes.core.k8s:
        state: present
        kubeconfig: "{{ kubeconfig_path }}"
        context: "{{ kube_context }}"
        definition: "{{ lookup('template', 'templates/ingress.yaml.j2') | from_yaml }}"

    - name: Apply ServiceMonitor (Prometheus scrape config)
      kubernetes.core.k8s:
        state: present
        kubeconfig: "{{ kubeconfig_path }}"
        context: "{{ kube_context }}"
        definition: "{{ lookup('template', 'templates/servicemonitor.yaml.j2') | from_yaml }}"

    - name: Apply Grafana dashboard ConfigMap
      kubernetes.core.k8s:
        state: present
        kubeconfig: "{{ kubeconfig_path }}"
        context: "{{ kube_context }}"
        definition:
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: "{{ app_name }}-dashboard"
            namespace: monitoring
            labels:
              grafana_dashboard: "1"
          data:
            devops-cicd-lab.json: "{{ lookup('file', 'files/grafana-dashboard.json') }}"

    - name: Apply AlertManager SMTP credential Secret
      kubernetes.core.k8s:
        state: present
        kubeconfig: "{{ kubeconfig_path }}"
        context: "{{ kube_context }}"
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: alertmanager-resend
            namespace: monitoring
          type: Opaque
          stringData:
            password: "{{ lookup('env', 'RESEND_API_KEY') }}"
      no_log: true

    - name: Apply AlertManager configuration Secret
      kubernetes.core.k8s:
        state: present
        kubeconfig: "{{ kubeconfig_path }}"
        context: "{{ kube_context }}"
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: alertmanager-config
            namespace: monitoring
          type: Opaque
          stringData:
            alertmanager.yaml: |
              global:
                resolve_timeout: 5m
                smtp_from: 'onboarding@resend.dev'
                smtp_smarthost: 'smtp.resend.com:587'
                smtp_auth_username: 'resend'
                smtp_auth_password_file: '/etc/resend/password'
                smtp_require_tls: true
              route:
                receiver: 'null'
                group_by: [alertname]
                group_wait: 30s
                group_interval: 5m
                repeat_interval: 1h
                routes:
                  - matchers:
                      - alertname = "AppDown"
                    receiver: email
              receivers:
                - name: 'null'
                - name: email
                  email_configs:
                    - to: "{{ lookup('env', 'RESEND_TO_EMAIL') }}"
                      send_resolved: true

    - name: Apply PrometheusRule (AppDown alert)
      kubernetes.core.k8s:
        state: present
        kubeconfig: "{{ kubeconfig_path }}"
        context: "{{ kube_context }}"
        definition:
          apiVersion: monitoring.coreos.com/v1
          kind: PrometheusRule
          metadata:
            name: "{{ app_name }}"
            namespace: "{{ k8s_namespace }}"
            labels:
              app: "{{ app_name }}"
              release: kps
          spec:
            groups:
              - name: "{{ app_name }}.rules"
                rules:
                  - alert: AppDown
                    expr: 'absent(up{job="devops-cicd-lab",namespace="demo"}) == 1 or sum(up{job="devops-cicd-lab",namespace="demo"}) == 0'
                    for: 2m
                    labels:
                      severity: critical
                      app: "{{ app_name }}"
                    annotations:
                      summary: "devops-cicd-lab is DOWN"
                      description: "No instances of devops-cicd-lab are reporting up=1 for more than 2 minutes."

    - name: Show what was deployed
      kubernetes.core.k8s_info:
        kubeconfig: "{{ kubeconfig_path }}"
        context: "{{ kube_context }}"
        api_version: v1
        kind: Pod
        namespace: "{{ k8s_namespace }}"
        label_selectors:
          - "app={{ app_name }}"
      register: pods

    - name: Print pod summary
      ansible.builtin.debug:
        msg: "{{ item.metadata.name }} -> {{ item.status.phase }}"
      loop: "{{ pods.resources }}"
      loop_control:
        label: "{{ item.metadata.name }}"
